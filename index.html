/* ============================
匹配算法 (严格按权重执行)
============================ */
function calculate() {
  quizScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");
  let ranking = [];

  for (const name in IDOLS) {
    const idol = IDOLS[name];
    let score = 0; // 满分设为 100 分

    // 1. 八字日主匹配 (最高 25分)
    // 修复：直接用用户的喜用神(fav) 去匹配偶像的真实日主(dayMaster)
    const fav = baziMap[user.bazi] || [];
    if (fav.includes(idol.traits.dayMaster)) {
      score += 25; // 是用户的喜用神，天作之合
    } else if (user.bazi === idol.traits.dayMaster) {
      score += 10; // 日主相同，像照镜子一样有默契
    }

    // 2. MBTI 匹配 (最高 25分)
    if (mbtiMatch[user.mbti] && mbtiMatch[user.mbti].includes(idol.traits.mbti)) { 
      score += 25; // 官配 MBTI
    } else if (idol.traits.mbti === user.mbti) { 
      score += 15; // 相同 MBTI
    }

    // 3. 星座匹配 (最高 15分)
    if (zodiacMatch[user.zodiac] && zodiacMatch[user.zodiac].includes(idol.traits.zodiac)) { 
      score += 15; 
    } else if (idol.traits.element === zodiacElement[user.zodiac]) { 
      score += 5; // 星象元素相同（风水火土）
    }

    // 4. 血型匹配 (最高 10分)
    if (user.blood === "N/A" || idol.traits.blood === "N/A") {
      // 如果用户或偶像血型未知，给一个中庸的基础分 (例如 5分)，不影响整体大局
      score += 5; 
    } else if (bloodMatchScore[user.blood] && bloodMatchScore[user.blood][idol.traits.blood]) {
      // 根据兼容性表加分
      score += bloodMatchScore[user.blood][idol.traits.blood];
    } else if (idol.traits.blood === user.blood) {
      // 万一逻辑漏掉的情况（兜底：相同血型满分）
      score += 10;
    }

    // 5. 性能量问答测试 (最高 25分)
    // 4道题，如果偶像的 energy 恰好是你选择最多的，每命中一题给 6.25 分
    if (personality[idol.traits.energy]) { 
      score += personality[idol.traits.energy] * 6.25; 
    }

    ranking.push({ name, score, traits: idol.traits });
  }

  // 按分数从高到低排序
  ranking.sort((a, b) => b.score - a.score);
  
  let rankHTML = "";
  ranking.slice(0, 5).forEach((r, i) => {
    // 将 0-100 的绝对分数，映射到 45%-99% 的区间，避免出现超低分让用户感到扫兴
    let displayPercent = Math.floor(45 + (r.score / 100) * 54); 
    // 防止超出 99%
    displayPercent = Math.min(displayPercent, 99); 
    
    // 给第一名加个小皇冠特效
    let crown = i === 0 ? "👑 " : "";
    rankHTML += `<div class='rank-item'>${crown}${i + 1}. ${r.name} <span class='percent'>契合度 ${displayPercent}%</span></div>`;
  });

  /* ============================
   结果渲染
   ============================ */

  }
}

// 辅助函数：执行复制动作
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    alert("✨ 分享文案和网址已复制！\n\n快去发小红书/微博安利你的本命吧~");
  }).catch(err => {
    console.error('复制失败', err);
  });
}
