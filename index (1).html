<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#1f1c2c,#928dab);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#222}
.app{width:100%;max-width:900px;background:white;border-radius:20px;padding:36px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
h1{text-align:center;margin-top:0}
.subtitle{text-align:center;color:#666;margin-bottom:25px}
.section{margin-bottom:22px}
label{display:block;font-weight:bold;margin-bottom:6px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc}
button{border:none;border-radius:10px;padding:14px 18px;font-size:16px;cursor:pointer;background:black;color:white}
.option{width:100%;margin:8px 0;background:#f3f3f3;color:black;text-align:left}
.option:hover{background:#e8e8e8}
.progress{height:8px;background:#eee;border-radius:20px;margin-bottom:20px;overflow:hidden}
.progress-bar{height:100%;background:black;width:0%}
.question{font-size:20px;margin-bottom:10px}
.hidden{display:none}
.result{text-align:center}
.result img{width:200px;border-radius:14px;margin-top:10px}
.rank{margin-top:20px;text-align:left}
.rank-item{padding:8px 0;border-bottom:1px solid #eee}
.percent{float:right;color:#666}
.actions{margin-top:22px}
.secondary{background:#eee;color:black;margin-left:10px}
.badge{display:inline-block;background:#eee;padding:4px 10px;border-radius:20px;margin:3px;font-size:12px}
</style>
</head>

<div class="app">

<div id="profileScreen">

</select>
</div>

<div class="section">
<label>你的MBTI</label>
<input id="mbti" placeholder="例如 INFP(大写)" />
</div>

<div class="section">
<label>你的血型</label>
<select id="blood">
<option>A</option>
<option>B</option>
<option>O</option>
<option>AB</option>
</select>
</div>

<div class="section">
<label>你的八字日主</label>
<select id="bazi">

<option>庚金</option>
<option>辛金</option>
<option>壬水</option>
<option>癸水</option>
</select>
</div>

<div style="text-align:center">
<button onclick="startQuiz()">开始匹配</button>
</div>

</div>


<!-- 问答 -->

<div id="quizScreen" class="hidden">
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div id="questionBox"></div>
<div id="optionsBox"></div>
</div>


<!-- 结果 -->

<div id="resultScreen" class="hidden result"></div>

</div>

    } else if (user.bazi === idol.traits.dayMaster) {
      score += 10; // 日主相同，像照镜子一样有默契
    }

    // 2. MBTI 匹配 (最高 25分)
    if (mbtiMatch[user.mbti] && mbtiMatch[user.mbti].includes(idol.traits.mbti)) { 
      score += 25; // 官配 MBTI
    } else if (idol.traits.mbti === user.mbti) { 
      score += 15; // 相同 MBTI
    }

    // 3. 星座匹配 (最高 15分)
    if (zodiacMatch[user.zodiac] && zodiacMatch[user.zodiac].includes(idol.traits.zodiac)) { 
      score += 15; 
    } else if (idol.traits.element === zodiacElement[user.zodiac]) { 
      score += 5; // 星象元素相同（风水火土）
    }

    // 4. 血型匹配 (最高 10分)

    // 5. 性能量问答测试 (最高 25分)
    // 4道题，如果偶像的 energy 恰好是你选择最多的，每命中一题给 6.25 分
    if (personality[idol.traits.energy]) { 
      score += personality[idol.traits.energy] * 6.25; 
    }

    ranking.push({ name, score, traits: idol.traits });
  }

  // 按分数从高到低排序
  ranking.sort((a, b) => b.score - a.score);
  
  let rankHTML = "";
  ranking.slice(0, 5).forEach((r, i) => {
    // 将 0-100 的绝对分数，映射到 45%-99% 的区间，避免出现超低分让用户感到扫兴

    rankHTML += `<div class='rank-item'>${crown}${i + 1}. ${r.name} <span class='percent'>契合度 ${displayPercent}%</span></div>`;
  });

  /* ============================
